inputs:
  gemini-cli-sessions:
    disabled: false
    sendToRoutes: true
    pqEnabled: false
    streamtags: []
    mode: manual
    interval: 10
    filenames:
      - "session-*.json"
    filterArchivedFiles: false
    tailOnly: false
    idleTimeout: 300
    checkFileModTime: false
    forceText: false
    hashLen: 256
    staleChannelFlushMs: 10000
    suppressMissingPathErrors: false
    deleteFiles: false
    saltHash: false
    includeUnidentifiableBinary: false
    recurse: true
    type: file
    path: "$GEMINI_HOME/.gemini/tmp"
    metadata:
      - name: datatype
        value: "'gemini-cli-session'"

  gemini-cli-logs:
    disabled: false
